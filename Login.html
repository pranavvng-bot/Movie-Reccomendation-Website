<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieVault - Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="STYLE.css">
</head>
<body>

<!-- LOGIN PAGE (full screen) -->
<div id="loginPage">
  <div class="login-card">
    <div class="login-logo"><span>Movie</span>Vault</div>
    <div class="login-tagline">INDIAN CINEMA HUB</div>
    <div class="tab-row">
      <button id="tabL" class="tab-btn active" onclick="window.location.href='login.html'">Login</button>
      <button id="tabS" class="tab-btn" onclick="window.location.href='signup.html'">Sign Up</button>
    </div>
    <div id="divLogin">
      <form onsubmit="event.preventDefault(); doLogin();">
        <input id="lUser" class="form-control-custom" type="text" placeholder="Username">
        <input id="lPass" class="form-control-custom" type="password" placeholder="Password">
        <button type="submit" class="btn-red">Sign In</button>
      </form>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
