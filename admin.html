<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieVault - Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="STYLE.css">
</head>
<body>

<!-- MAIN APP -->
<div id="appShell">
  <nav class="topnav">
    <div class="topnav-inner">
      <span class="nav-logo" onclick="window.location.href='index.html'"><span>Movie</span>Vault</span>
      <form class="nav-search-wrap" onsubmit="event.preventDefault(); searchMovie();">
        <input id="searchInput" class="nav-search-input" placeholder="Search movies...">
        <button type="submit" class="nav-search-btn">Go</button>
      </form>
      <div class="nav-links">
        <button class="nav-link-btn" onclick="window.location.href='index.html'">Home</button>
        <button class="nav-link-btn" onclick="window.location.href='genres.html'">Genres</button>
        <button class="nav-link-btn" onclick="window.location.href='favourites.html'">Fav</button>
        <button class="nav-link-btn" onclick="window.location.href='contact.html'">Contact</button>
        <button class="nav-link-btn" onclick="window.location.href='about.html'">About</button>
        <button id="adminNavBtn" class="nav-link-btn admin-btn active" onclick="window.location.href='admin.html'">Admin</button>
        <button class="nav-exit-btn" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>
  <div id="mainContent"></div>
  <footer class="site-footer">
    <div class="container">
      <div class="footer-main">
        <div><span class="nav-logo" style="font-size:28px;"><span style="color:var(--red);">Movie</span>Vault</span><p style="color:var(--gray); font-size:12px; margin-top:10px;">Indian Cinema Discovery Platform</p></div>
        <div><h4 style="color:var(--gray); font-size:11px; margin-bottom:14px;">NAVIGATE</h4><a class="footer-link" onclick="window.location.href='index.html'">Home</a><a class="footer-link" onclick="window.location.href='genres.html'">Genres</a><a class="footer-link" onclick="window.location.href='favourites.html'">Favorites</a></div>
        <div><h4 style="color:var(--gray); font-size:11px; margin-bottom:14px;">CINEMA</h4>
          <span class="footer-link">Bollywood</span>
          <span class="footer-link">Tollywood</span>
          <span class="footer-link">Kollywood</span>
          <span class="footer-link">Mollywood</span>
        </div>
      </div>
      <div class="footer-bottom"><p>© 2025 MovieVault · Made with ❤️</p><p>Powered by TMDb API</p></div>
    </div>
  </footer>
</div>

<!-- ADMIN MODAL (auto-opens on this page) -->
<div class="modal fade" id="adminModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Admin Panel</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" onclick="window.location.href='index.html'"></button>
      </div>
      <div class="modal-body">
        <div class="form-check form-switch mb-3">
          <input class="form-check-input" type="checkbox" id="toggleTrending" checked>
          <label class="form-check-label" for="toggleTrending">🔥 Show Trending Section</label>
        </div>
        <div class="form-check form-switch mb-3">
          <input class="form-check-input" type="checkbox" id="toggleTopRated" checked>
          <label class="form-check-label" for="toggleTopRated">⭐ Show Top Rated Section</label>
        </div>
        <div class="form-check form-switch mb-3">
          <input class="form-check-input" type="checkbox" id="toggleUpcoming" checked>
          <label class="form-check-label" for="toggleUpcoming">📅 Show Upcoming Section</label>
        </div>
        <button class="btn-red w-100" onclick="applyAdminSettings()">Apply & Refresh Home</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
<script>
  // Auto-open admin modal on page load
  document.addEventListener('DOMContentLoaded', function() {
    var adminModal = new bootstrap.Modal(document.getElementById('adminModal'));
    adminModal.show();
    // Show admin nav button since we're on admin page
    var adminBtn = document.getElementById('adminNavBtn');
    if (adminBtn) adminBtn.style.display = '';
  });
</script>
</body>
</html>
